name: scanning_papers_withcode
description: نظام إدخال درجات الطلاب عبر مسح QR Code والدرجة المكتوبة بخط اليد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # المكتبات الأساسية
  cupertino_icons: ^1.0.8
  
  # اختيار الملفات
  file_picker: ^8.1.0
  
  # معالجة Excel
  excel: ^4.0.0
  
  # مسح QR Code
  mobile_scanner: ^5.1.0
  
  # OCR للتعرف على النصوص
  google_mlkit_text_recognition: ^0.13.1
  
  # الصلاحيات
  permission_handler: ^11.3.1
  
  # معالجة الصور (للقص)
  image: ^4.3.0
  
  # اختيار مسار الملفات
  path_provider: ^2.1.3
 
  # لتوليد QR Codes
  qr: ^3.0.0       

  # لعرض QR Codes في الواجهة (اختياري) 
  qr_flutter: ^4.1.0  
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
