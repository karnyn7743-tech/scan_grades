name: student_grades_scanner
description: نظام إدخال درجات الطلاب
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # الكاميرا والملفات
  camera: ^0.11.0
  file_picker: ^8.1.0

  # معالجة Excel
  excel: ^4.0.6

  # QR Code
  mobile_scanner: ^7.2.0

  # OCR للتعرف على النصوص
  google_ml_kit: ^0.18.0

  # تخزين مؤقت وحالة التطبيق
  shared_preferences: ^2.3.0
  provider: ^6.1.0

  # معالجة الصور
  image: ^4.2.0
  path_provider: ^2.1.3

  # أذونات
  permission_handler: ^11.3.1

  # واجهات إضافية
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # إذا كنت تستخدم خطوط أو صور محلية
  # assets:
  #   - assets/images/
  #   - assets/ml/  # لنماذج ML Kit

