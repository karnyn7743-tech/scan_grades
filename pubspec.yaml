name: scanning_papers_withcode
description: نظام إدخال درجات الطلاب عبر مسح QR Code والدرجة المكتوبة بخط اليد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # المكتبات الأساسية
  cupertino_icons: ^1.0.8
  
  # اختيار الملفات
  file_picker: ^8.1.0
  
  # معالجة Excel
  excel: ^4.0.0
  
  # مسح QR Code
  mobile_scanner: ^5.1.0
  
  # OCR للتعرف على النصوص
  google_mlkit_text_recognition: ^0.13.1
  
  # الصلاحيات
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.0
 
  # معالجة الصور (للقص)
  image: ^4.3.0

  # http: ^1.2.0   # أضف هذا السطر

  # اختيار مسار الملفات
  path_provider: ^2.1.3      

  # ... باقي الحزم ...
  # qr_code_generator: ^1.0.3   # أضف هذا السط

  # توليد QR Codes 
  # barcode: ^2.2.0      
  qrscan_plus: ^1.0.8   # بدلاً من http

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4   # ✅ الإصدار هنا فقط (مرة واحدة)

flutter:
  uses-material-design: true

# ⬇️ التكوين هنا في الجذر (خارج dev_dependencies) ⬇️
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

