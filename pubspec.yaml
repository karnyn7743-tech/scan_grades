name: student_grades_scanner
description: نظام إدخال درجات الطلاب عبر مسح QR Code والدرجة المكتوبة بخط اليد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # المكتبات الأساسية
  cupertino_icons: ^1.0.8
  
  # الكاميرا والملفات
  camera: ^0.11.0
  file_picker: ^8.1.0
  
  # معالجة Excel
  excel: ^4.0.0
  
  # مسح QR Code
  mobile_scanner: ^5.1.0
  
  # OCR للتعرف على النصوص (الأرقام العربية والإنجليزية)
  google_ml_kit: ^0.18.0
  
  # التخزين المؤقت والصلاحيات
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  permission_handler: ^11.3.1
  
  # معالجة الصور
  image: ^4.2.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # مجلدات الأصول (ضع أيقونتك هنا)
  # assets:
  #   - assets/images/
